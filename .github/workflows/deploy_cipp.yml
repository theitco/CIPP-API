name: Deploy CIPP API

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create ZIP package
        run: |
          if (Test-Path "cipp.zip") { Remove-Item "cipp.zip" }
          Compress-Archive -Path * -DestinationPath cipp.zip

      - name: Extract publish profile credentials
        id: extract
        shell: pwsh
        run: |
          $profile = '${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_CIPP }}'

          $username = ($profile | Select-String -Pattern 'userName="([^"]+)"').Matches.Groups[1].Value
          $password = ($profile | Select-String -Pattern 'userPWD="([^"]+)"').Matches.Groups[1].Value
          $publishUrl = ($profile | Select-String -Pattern 'publishUrl="([^"]+)"').Matches.Groups[1].Value

          echo "username=$username" >> $env:GITHUB_OUTPUT
          echo "password=$password" >> $env:GITHUB_OUTPUT
          echo "publishurl=$publishUrl" >> $env:GITHUB_OUTPUT

      - name: Deploy via ZipDeploy API
        shell: pwsh
        run: |
          $pair = "${{ steps.extract.outputs.username }}:${{ steps.extract.outputs.password }}"
          $bytes = [System.Text.Encoding]::UTF8.GetBytes($pair)
          $encoded = [Convert]::ToBase64String($bytes)

          Invoke-WebRequest `
            -Uri "https://${{ steps.extract.outputs.publishurl }}/api/zipdeploy" `
            -Headers @{ Authorization = "Basic $encoded" } `
            -Method POST `
            -InFile "cipp.zip" `
            -ContentType "application/zip"
