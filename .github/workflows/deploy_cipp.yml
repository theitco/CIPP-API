name: Deploy CIPP API

on:
  push:
    branches:
      - master
  workflow_dispatch:

env:
  ZIP_PATH: cipp.zip

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create deployment ZIP
        run: zip -r $ZIP_PATH .

      - name: Deploy via ZipDeploy API
        run: |
          curl -X POST \
            -u "${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_CIPP }}" \
            --data-binary @$ZIP_PATH \
            "https://cipp-amh5dwdwhhgeaj5.scm.canadacentral-01.azurewebsites.net/api/zipdeploy"
