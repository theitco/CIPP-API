name: Deploy CIPP API

on:
  push:
    branches:
      - master
  workflow_dispatch:

env:
  ZIP_PATH: cipp.zip

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install zip
        run: sudo apt-get update && sudo apt-get install -y zip

      - name: Create deployment ZIP
        run: zip -r $ZIP_PATH .

      - name: Extract publish profile credentials
        id: extract
        run: |
          PROFILE="${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_CIPP }}"

          USERNAME=$(echo "$PROFILE" | grep -oP 'userName="\K[^"]+')
          PASSWORD=$(echo "$PROFILE" | grep -oP 'userPWD="\K[^"]+')
          PUBLISHURL=$(echo "$PROFILE" | grep -oP 'publishUrl="\K[^"]+' | head -n 1)

          echo "username=$USERNAME" >> $GITHUB_OUTPUT
          echo "password=$PASSWORD" >> $GITHUB_OUTPUT
          echo "publishurl=$PUBLISHURL" >> $GITHUB_OUTPUT

      - name: Deploy via ZipDeploy API
        run: |
          curl -X POST \
            -u "${{ steps.extract.outputs.username }}:${{ steps.extract.outputs.password }}" \
            --data-binary @$ZIP_PATH \
            "https://${{ steps.extract.outputs.publishurl }}/api/zipdeploy"
