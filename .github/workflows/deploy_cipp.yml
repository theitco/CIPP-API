name: Deploy CIPP API

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Create ZIP
        run: Compress-Archive -Path * -DestinationPath cipp.zip -Force

      - name: Extract publish profile credentials
        id: extract
        shell: pwsh
        run: |
          $profile = '${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_CIPP }}'

          $user = ($profile | Select-String 'userName="([^"]+)"').Matches.Groups[1].Value
          $pass = ($profile | Select-String 'userPWD="([^"]+)"').Matches.Groups[1].Value
          $rawUrl = ($profile | Select-String 'publishUrl="([^"]+)"').Matches.Groups[1].Value

          # Remove :443 if present
          $cleanUrl = $rawUrl.Split(':')[0]

          echo "username=$user" >> $env:GITHUB_OUTPUT
          echo "password=$pass" >> $env:GITHUB_OUTPUT
          echo "publishurl=$cleanUrl" >> $env:GITHUB_OUTPUT

      - name: Deploy via ZipDeploy
        shell: pwsh
        run: |
          $pair = "${{ steps.extract.outputs.username }}:${{ steps.extract.outputs.password }}"
          $auth = [Convert]::ToBase64String([Text.Encoding]::UTF8.GetBytes($pair))

          Invoke-WebRequest `
            -Uri "https://${{ steps.extract.outputs.publishurl }}/api/zipdeploy" `
            -Headers @{ Authorization = "Basic $auth" } `
            -Method POST `
            -InFile "cipp.zip" `
            -ContentType "application/zip"
